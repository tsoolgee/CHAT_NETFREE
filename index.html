<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צ'אט ישיר מאובטח - P2P</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text: #333333;
            --primary: #007bff;
            --primary-hover: #0056b3;
            --chat-bg: #e5ddd5;
            --bubble-me: #dcf8c6;
            --bubble-them: #ffffff;
        }

        body.dark {
            --bg: #121212;
            --surface: #1e1e1e;
            --border: #333333;
            --text: #e0e0e0;
            --primary: #3792ff;
            --primary-hover: #1c75dd;
            --chat-bg: #0b141a;
            --bubble-me: #005c4b;
            --bubble-them: #202c33;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Heebo', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 0.3s;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 15px;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .theme-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: center;
        }

        .hidden { display: none !important; }

        input, button {
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
            outline: none;
        }

        input {
            background: var(--surface);
            color: var(--text);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: var(--primary-hover); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .or-divider {
            text-align: center;
            margin: 15px 0;
            color: #888;
            position: relative;
        }

        .code-display {
            background: var(--bg);
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            border: 1px dashed var(--primary);
            margin-bottom: 15px;
            letter-spacing: 1px;
            user-select: all;
        }

        /* אזור הצ'אט */
        #chatMessages {
            flex: 1;
            background: var(--chat-bg);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.me {
            background: var(--bubble-me);
            align-self: flex-start;
            border-top-right-radius: 0;
            color: #000;
        }
        body.dark .message.me { color: #fff; }

        .message.them {
            background: var(--bubble-them);
            align-self: flex-end;
            border-top-left-radius: 0;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            margin-bottom: 0;
        }

        .chat-input-area button {
            margin-bottom: 0;
            padding: 0 20px;
        }

        .status-text {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span id="chatTitle">צ'אט P2P מאובטח</span>
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
    </div>

    <div id="setupScreen" class="screen">
        <input type="text" id="usernameInput" placeholder="הכנס את השם שלך...">
        
        <button id="hostBtn" onclick="initializePeer(true)">צור חדר חדש (מארח)</button>
        
        <div id="loadingArea" class="hidden">
            <div class="status-text">מתחבר לשרת הענן המאובטח...</div>
        </div>

        <div id="codeArea" class="hidden">
            <div class="status-text" style="margin-bottom: 5px;">שתף את הקוד הזה עם החבר:</div>
            <div class="code-display" id="generatedCode">------</div>
            <div class="status-text">מחכה שהחבר יתחבר...</div>
        </div>

        <div class="or-divider">או</div>

        <input type="text" id="joinCodeInput" placeholder="הדבק קוד חיבור של חבר...">
        <button id="joinBtn" onclick="initializePeer(false)">התחבר לחבר</button>
        <div id="joinStatus" class="status-text"></div>
    </div>

    <div id="chatScreen" class="screen hidden" style="padding: 0;">
        <div id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="msgInput" placeholder="הקלד הודעה..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">שלח</button>
        </div>
    </div>
</div>

<script>
    let peer = null;
    let conn = null;
    let myName = "";
    let isHost = false;

    // הגדרות חיבור קבועות ומאובטחות לעקיפת חומות אש ב-GitHub Pages
    const peerOptions = {
        host: '0.peerjs.com',
        port: 443,
        path: '/',
        secure: true,
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        }
    };

    function toggleTheme() {
        document.body.classList.toggle('dark');
    }

    function initializePeer(hostMode) {
        myName = document.getElementById('usernameInput').value.trim() || "משתמש";
        isHost = hostMode;

        document.getElementById('hostBtn').disabled = true;
        document.getElementById('joinBtn').disabled = true;

        if (isHost) {
            document.getElementById('loadingArea').classList.remove('hidden');
            // ביצירת חדר, אנו נותנים לשרת להנפיק ID ייחודי בטוח לחלוטין
            peer = new Peer(peerOptions);
            
            peer.on('open', (id) => {
                document.getElementById('loadingArea').classList.add('hidden');
                document.getElementById('codeArea').classList.remove('hidden');
                document.getElementById('generatedCode').textContent = id;
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnectionHandlers();
            });
        } else {
            const targetId = document.getElementById('joinCodeInput').value.trim();
            if (!targetId) {
                alert("אנא הזן קוד חיבור תקין!");
                document.getElementById('hostBtn').disabled = false;
                document.getElementById('joinBtn').disabled = false;
                return;
            }

            document.getElementById('joinStatus').textContent = "מתחבר לחבר...";
            peer = new Peer(peerOptions);

            peer.on('open', () => {
                conn = peer.connect(targetId);
                setupConnectionHandlers();
            });
        }

        peer.on('error', (err) => {
            console.error(err);
            alert("שגיאת תקשורת: " + err.type);
            location.reload();
        });
    }

    function setupConnectionHandlers() {
        // כאשר החיבור מצליח ונפתח
        conn.on('open', () => {
            // החלפת מסכים
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('chatTitle').textContent = "שיחה מאובטחת";
            
            // שליחת השם שלי לצד השני כהודעת מערכת ראשונית
            conn.send({ type: 'system-init', name: myName });
        });

        // קבלת מידע מהצד השני
        conn.on('data', (data) => {
            if (data.type === 'system-init') {
                document.getElementById('chatTitle').textContent = "שיחה עם " + data.name;
            } else if (data.type === 'chat') {
                appendMessage(data.text, 'them');
            }
        });

        conn.on('close', () => {
            alert("החבר התנתק מהשיחה.");
            location.reload();
        });
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !conn) return;

        // שליחה לצד השני
        conn.send({ type: 'chat', text: text });
        
        // הצגה על המסך שלי
        appendMessage(text, 'me');
        input.value = "";
    }

    function appendMessage(text, side) {
        const container = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', side);
        msgDiv.textContent = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
